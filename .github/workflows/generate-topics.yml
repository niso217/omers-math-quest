name: Initialize JSON Topics
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Generate JSON if missing
        run: |
          if [ ! -f topic1.json ]; then
            python generate_json.py
          fi
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add topic*.json
          git commit -m "Auto-generate initial topic JSON files" || echo "No changes to commit"
          git push