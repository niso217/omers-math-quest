<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המסע האפי של עומר</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Epic Look -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="theme-default">
    <div id="particle-container"></div>
    <div id="toast-container"></div>

    <!-- MAIN MENU / MAP VIEW -->
    <div id="map-view" class="view active">
        <header class="top-bar">
            <h1>המסע האפי של עומר</h1>
            <div class="stats">
                <div class="stat"><span class="icon">🪙</span> <span id="coin-display">0</span> מטבעות</div>
                <button id="open-shop-btn" class="btn-small">🛒 חנות</button>
            </div>
        </header>

        <div class="map-container">
            <!-- SVG paths will be injected dynamically to connect nodes -->
            <svg id="map-paths" class="map-paths"></svg>
            <div id="nodes-container" class="nodes-container">
                <!-- Nodes generated by JS -->
            </div>
        </div>
    </div>

    <!-- LEVEL VIEW -->
    <div id="level-view" class="view hidden">
        <header class="top-bar game-header">
            <button id="back-to-map-btn" class="btn-small">🔙 מפה</button>
            <h2 id="level-title">שלב X</h2>
            <div class="stats">
                <div class="stat"><span class="icon">❤️</span> <span id="heart-display">3</span></div>
                <div class="stat"><span class="icon">🪙</span> <span id="level-coin-display">0</span></div>
            </div>
        </header>

        <div class="lifeline-container">
            <button id="btn-5050" class="btn-lifeline">50/50 (1)</button>
            <button id="btn-hint" class="btn-lifeline">🧚‍♀️ גלגל הצלה (1)</button>
        </div>

        <div class="game-board">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            
            <div class="question-container">
                <h3 id="question-text">טוען שאלה...</h3>
            </div>

            <div id="hint-box" class="hint-box hidden"></div>

            <div id="options-container" class="options-grid">
                <!-- Options generated by JS -->
            </div>
        </div>
    </div>

    <!-- BOSS VIEW -->
    <div id="boss-view" class="view hidden boss-theme">
        <header class="top-bar boss-header">
            <h2>מלך החשבון - הקרב הגדול!</h2>
        </header>

        <div class="boss-arena">
            <div class="health-bars">
                <div class="health-bar-wrapper">
                    <span class="name-tag">עומר</span>
                    <div class="health-bar bg-green"><div id="omer-hp" class="health-fill" style="width: 100%"></div></div>
                </div>
                <div class="health-bar-wrapper">
                    <span class="name-tag">מלך החשבון</span>
                    <div class="health-bar bg-red"><div id="boss-hp" class="health-fill" style="width: 100%"></div></div>
                </div>
            </div>

            <div class="boss-avatar-container">
                <!-- Add sound effects later with audio tags -->
                <!-- <audio id="boss-hit-snd" src="assets/hit.mp3"></audio> -->
                <div id="boss-avatar" class="boss-avatar">👑👿</div>
            </div>

            <div class="question-container boss-question">
                <h3 id="boss-question-text">טוען שאלה...</h3>
            </div>
            
            <div id="boss-options-container" class="options-grid">
                 <!-- Options generated by JS -->
            </div>
        </div>
    </div>

    <!-- SHOP MODAL -->
    <div id="shop-modal" class="modal hidden">
        <div class="modal-content">
            <h2>חנות הקסמים</h2>
            <p>יש לך: <span id="shop-coins">0</span> 🪙</p>
            <div class="shop-items">
                <div class="shop-item">
                    <h3>חיים נוספים ❤️</h3>
                    <p>מחיר: 50 🪙</p>
                    <button class="buy-btn" data-type="heart" data-cost="50">קנה</button>
                </div>
                <div class="shop-item">
                    <h3>נושא אופל 🌙</h3>
                    <p>מחיר: 200 🪙</p>
                    <button class="buy-btn" data-type="theme" data-cost="200" data-theme="dark">קנה</button>
                </div>
                <div class="shop-item">
                    <h3>נושא זהב ✨</h3>
                    <p>מחיר: 500 🪙</p>
                    <button class="buy-btn" data-type="theme" data-cost="500" data-theme="gold">קנה</button>
                </div>
            </div>
            <button id="close-shop-btn" class="btn-close">סגור</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal hidden">
        <div class="modal-content text-center">
            <h2 id="modal-title">כל הכבוד עומר!</h2>
            <p id="modal-desc">סיימת את השלב בהצלחה.</p>
            <div id="modal-reward-box" class="reward-box hidden">
                +<span id="modal-coins-earned">0</span> 🪙
            </div>
            <button id="modal-action-btn" class="btn-large">המשך</button>
        </div>
    </div>

    <!-- INCLUDES -->
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
