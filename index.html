<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המסע האפי של עומר</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    <div id="particle-container"></div>
    
    <!-- GLOBAL UI (Always visible) -->
    <div class="global-ui">
        <div class="stat-box">
            <span>🪙 <span id="coin-display">0</span></span>
        </div>
        <div class="stat-box">
            <span>❤️ <span id="heart-display">3</span></span>
        </div>
        <button id="open-shop-btn" class="shop-btn">חנות 🛒</button>
    </div>

    <!-- MAP VIEW -->
    <div id="map-view" class="view">
        <h1 class="game-title">המסע האפי של עומר 🚀</h1>
        <div class="map-container">
            <svg id="map-paths" class="map-paths"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <!-- LEVEL VIEW -->
    <div id="level-view" class="view hidden">
        <div class="level-header">
            <h2 id="level-title">שלב 1</h2>
            <button id="back-to-map-btn" class="secondary-btn">חזור למפה 🗺️</button>
        </div>
        
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="lifeline-container">
            <button id="btn-5050" class="lifeline-btn">50/50</button>
            <button id="btn-hint" class="lifeline-btn">🧚‍♀️ גלגל הצלה</button>
        </div>

        <div class="question-container">
            <div id="hint-box" class="hint-box hidden"></div>
            <h3 id="question-text" class="question-text">שאלה...</h3>
            <div id="options-container" class="options-grid">
                <!-- Options injected here -->
            </div>
        </div>
    </div>

    <!-- BOSS VIEW -->
    <div id="boss-view" class="view hidden">
        <div class="boss-arena">
            <div class="combatant">
                <div class="avatar" id="omer-avatar">👧</div>
                <h3>עומר</h3>
                <div class="hp-bar-container"><div id="omer-hp" class="hp-bar omer-hp"></div></div>
            </div>
            
            <div class="vs-badge">VS</div>
            
            <div class="combatant">
                <div class="avatar boss-avatar" id="boss-avatar">🧌</div>
                <h3>מלך החשבון</h3>
                <div class="hp-bar-container"><div id="boss-hp" class="hp-bar boss-hp"></div></div>
            </div>
        </div>

        <div class="question-container boss-question-box">
            <h3 id="boss-question-text" class="question-text">שאלה מיוחדת...</h3>
            <div id="boss-options-container" class="options-grid">
                <!-- Options -->
            </div>
        </div>
    </div>

    <!-- SHOP MODAL -->
    <div id="shop-modal" class="modal-overlay hidden">
        <div class="modal-content shop-content">
            <h2>חנות השדרוגים 🛍️</h2>
            <p>מטבעות: <span id="shop-coins">0</span> 🪙</p>
            
            <div class="shop-items">
                <div class="shop-item">
                    <span>❤️ חיים נוספים</span>
                    <button class="buy-btn" data-type="heart" data-cost="50">קנייה (50🪙)</button>
                </div>
                <div class="shop-item">
                    <span>🌌 נושא חלל</span>
                    <button class="buy-btn" data-type="theme" data-theme="space" data-cost="200">קנייה (200🪙)</button>
                </div>
                <div class="shop-item">
                    <span>🦄 נושא חדי-קרן</span>
                    <button class="buy-btn" data-type="theme" data-theme="unicorn" data-cost="200">קנייה (200🪙)</button>
                </div>
            </div>
            <button id="close-shop-btn" class="secondary-btn">סגור</button>
        </div>
    </div>

    <!-- SUCCESS/FAIL MODAL -->
    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            <div id="modal-reward-box" class="reward-box hidden">
                +<span id="modal-coins-earned">0</span> 🪙
            </div>
            <button id="modal-action-btn" class="primary-btn">המשך</button>
        </div>
    </div>

    <!-- INCLUDES -->
    <script src="script.js"></script>
</body>
</html>
